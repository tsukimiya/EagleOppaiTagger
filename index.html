<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>OppaiOracle Tagger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Meiryo", "Yu Gothic", sans-serif;
      font-size: 13px;
      background: #2b2b2b;
      color: #e0e0e0;
      padding: 12px;
      max-width: 616px;
      line-height: 1.5;
    }
    h2 { font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #ccc; }
    section { margin-bottom: 12px; padding: 8px; background: #333; border-radius: 4px; }
    label { display: inline-block; margin-right: 12px; cursor: pointer; }
    input[type="range"] { width: 200px; vertical-align: middle; }
    input[type="number"] { width: 60px; background: #444; color: #e0e0e0; border: 1px solid #555; padding: 2px 4px; }
    input[type="text"] { width: 100%; background: #444; color: #e0e0e0; border: 1px solid #555; padding: 4px; }
    button {
      background: #4a7; color: #fff; border: none; padding: 6px 16px;
      border-radius: 3px; cursor: pointer; font-size: 13px; margin-right: 8px;
    }
    button:hover { background: #5b8; }
    button:disabled { background: #555; color: #888; cursor: not-allowed; }
    button.cancel { background: #a54; }
    button.cancel:hover { background: #b65; }
    button.dl { background: #47a; }
    button.dl:hover { background: #58b; }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .row:last-child { margin-bottom: 0; }
    .val { min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }
    #progress-bar-wrap {
      width: 100%; height: 16px; background: #444; border-radius: 3px;
      overflow: hidden; margin-bottom: 4px;
    }
    #progress-bar {
      height: 100%; width: 0%; background: #4a7; transition: width 0.2s;
    }
    #progress-bar.cancelled { background: #ca4; }
    #progress-bar.error { background: #a44; }
    #progress-text { font-size: 12px; color: #aaa; }
    #summary { font-size: 12px; color: #bbb; }
    #summary .tags { color: #8cf; word-break: break-all; }
    .overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 100;
      justify-content: center; align-items: center;
    }
    .overlay.show { display: flex; }
    .dialog {
      background: #333; border: 1px solid #555; border-radius: 6px;
      padding: 20px; max-width: 420px; text-align: center;
    }
    .dialog p { margin-bottom: 12px; line-height: 1.6; }
    .dialog label { display: block; margin-bottom: 12px; font-size: 12px; }
    .status-ok { color: #4a7; }
    .status-warn { color: #ca4; }
  </style>
</head>
<body>
  <!-- 1. Header: model status -->
  <section id="header">
    <h2>OppaiOracle Tagger</h2>
    <div class="row">
      <span>モデル状態:</span>
      <span id="model-status">モデル配置済みとして実行可</span>
      <button id="dl-btn" class="dl" onclick="document.getElementById('model-status').textContent='手動DL: huggingface.co/Grio43/OppaiOracle/tree/main/V1.1_onnx';try{window.open('https://huggingface.co/Grio43/OppaiOracle/tree/main/V1.1_onnx','_blank')}catch(_){};setTimeout(function(){document.getElementById('model-status').textContent='models/V1.1/ に3ファイルを配置してください'},3000)">モデルをダウンロード</button>
    </div>
  </section>

  <!-- 2. Settings area -->
  <section id="settings">
    <h2>設定</h2>
    <div class="row">
      <label for="threshold">閾値:</label>
      <input type="range" id="threshold" min="0" max="1" step="0.05" value="0.5">
      <span id="threshold-val" class="val">0.50</span>
    </div>
    <div class="row">
      <label for="max-tags">最大タグ数:</label>
      <input type="number" id="max-tags" min="1" max="100" value="30">
    </div>
    <div class="row">
      <span>マージ戦略:</span>
      <label><input type="radio" name="merge" value="append" checked> 追加</label>
      <label><input type="radio" name="merge" value="overwrite"> 上書き</label>
      <label><input type="radio" name="merge" value="diff"> 差分</label>
    </div>
    <div class="row">
      <label for="blacklist">ブラックリスト:</label>
    </div>
    <div class="row">
      <input type="text" id="blacklist" placeholder="カンマ区切りで入力 (例: tag1, tag2)">
    </div>
    <!-- サーバ設定（Phase 8 追加） -->
    <div class="row" style="margin-top:8px;border-top:1px solid #555;padding-top:8px">
      <label><input type="checkbox" id="use-server"> サーバ推論を使用</label>
    </div>
    <div class="row">
      <label for="server-url">サーバ URL:</label>
      <input type="text" id="server-url" placeholder="http://192.168.1.10:8765" style="flex:1" disabled>
      <button id="server-test-btn" type="button" style="padding:2px 8px" disabled>接続テスト</button>
    </div>
    <div class="row">
      <label><input type="checkbox" id="fallback-on-error" checked> サーバ失敗時にローカルフォールバック</label>
    </div>
    <div id="server-status" style="font-size:11px;color:#aaa;margin-left:8px"></div>
    <!-- 自動モード設定（Phase 10 追加・SPEC §15.7） -->
    <div class="row" style="margin-top:8px;border-top:1px solid #555;padding-top:8px">
      <label><input type="checkbox" id="auto-enabled"> 自動モード（ウィンドウを開いている間のみ動作）</label>
    </div>
    <div class="row">
      <label for="auto-interval">ポーリング間隔:</label>
      <input type="range" id="auto-interval" min="30" max="300" step="5" value="45">
      <span id="auto-interval-val" class="val">45</span> 秒
    </div>
    <div class="row">
      <label for="auto-max-errors">連続エラー上限:</label>
      <input type="number" id="auto-max-errors" min="1" max="50" value="5">
    </div>
    <div class="row" id="auto-status-row" style="display:none">
      <span id="auto-status" style="font-size:11px;color:#aaa"></span>
      <!-- Phase 10.2: エラー停止時に詳細をクリップボードへコピー（SPEC §15.10） -->
      <button id="auto-error-copy-btn" style="display:none;font-size:10px;margin-left:8px;padding:1px 6px">詳細コピー</button>
    </div>
  </section>

  <!-- 3. Action area -->
  <section id="actions">
    <button id="run-btn">実行</button>
    <button id="cancel-btn" class="cancel" disabled>キャンセル</button>
  </section>

  <!-- 4. Progress area -->
  <section id="progress">
    <h2>進捗</h2>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="progress-text">待機中</div>
  </section>

  <!-- 5. Results summary -->
  <section id="summary-section" style="display:none">
    <h2>結果</h2>
    <div id="summary"></div>
  </section>

  <!-- NSFW warning overlay -->
  <div id="nsfw-warning" class="overlay">
    <div class="dialog">
      <p>OppaiOracle は汎用アニメ画像タガーで、語彙に NSFW タグを含みます。<br>結果の運用は自己責任で行ってください。</p>
      <label><input type="checkbox" id="nsfw-dismiss"> 今後表示しない</label>
      <br>
      <button id="nsfw-ok">了解</button>
    </div>
  </div>

  <!-- 自動モード専用 NSFW 警告（Phase 10・初回 ON 時のみ） -->
  <div id="auto-nsfw-warning" class="overlay">
    <div class="dialog">
      <p>自動モードを有効化します。<br>AI がユーザー確認なしでタグを付与します。NSFW タグが含まれる可能性があるため、ブラックリストの設定を推奨します。</p>
      <label><input type="checkbox" id="auto-nsfw-dismiss"> 今後表示しない</label>
      <br>
      <button id="auto-nsfw-cancel">キャンセル</button>
      <button id="auto-nsfw-ok">有効化</button>
    </div>
  </div>

  <script src="src/ui.js"></script>
</body>
</html>
