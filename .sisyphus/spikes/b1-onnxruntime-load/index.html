<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>Spike: onnxruntime-node load</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; margin: 16px; }
  h1 { font-size: 16px; margin: 0 0 4px; }
  p.subtitle { font-size: 12px; color: #888; margin: 0 0 12px; }
  button { padding: 8px 16px; font-size: 13px; cursor: pointer; }
  pre { background: rgba(127,127,127,0.1); padding: 10px; border-radius: 4px; font-size: 11px; max-height: 360px; overflow: auto; white-space: pre-wrap; word-break: break-all; }
  .verdict { padding: 8px 12px; border-radius: 4px; font-weight: 600; margin: 10px 0; display: none; }
  .verdict.PASS_LOAD_AND_CALL { background: #d4f5d4; color: #156315; display: block; }
  .verdict.PARTIAL_LOAD_ONLY { background: #fff3cd; color: #8a6d00; display: block; }
  .verdict.FAIL_CANNOT_LOAD   { background: #f8d7da; color: #7a1a22; display: block; }
  .row { margin: 8px 0; }
</style>
</head>
<body>
  <h1>Spike B1 — onnxruntime-node load</h1>
  <p class="subtitle">Eagle Plugin API / Chromium 107 / Node 16</p>

  <div class="row">
    <button id="run">Run diagnostic</button>
    <button id="copy" disabled>Copy result JSON</button>
  </div>

  <div id="verdict" class="verdict"></div>

  <pre id="output">(not run yet)</pre>

<script src="diagnose.js"></script>
<script>
  const out = document.getElementById('output');
  const verdictEl = document.getElementById('verdict');
  const runBtn = document.getElementById('run');
  const copyBtn = document.getElementById('copy');
  let lastResult = null;

  runBtn.addEventListener('click', async () => {
    runBtn.disabled = true;
    out.textContent = 'running...';
    try {
      lastResult = await window.runDiagnostic();
      out.textContent = JSON.stringify(lastResult, null, 2);
      const v = lastResult.verdict || 'FAIL_CANNOT_LOAD';
      verdictEl.textContent = `Verdict: ${v}`;
      verdictEl.className = `verdict ${v}`;
      copyBtn.disabled = false;
    } catch (e) {
      out.textContent = 'Fatal error in diagnostic runner: ' + (e && e.stack || e);
      verdictEl.textContent = 'Verdict: RUNNER_CRASH';
      verdictEl.className = 'verdict FAIL_CANNOT_LOAD';
    } finally {
      runBtn.disabled = false;
    }
  });

  copyBtn.addEventListener('click', async () => {
    if (!lastResult) return;
    try {
      await navigator.clipboard.writeText(JSON.stringify(lastResult, null, 2));
      copyBtn.textContent = 'Copied';
      setTimeout(() => { copyBtn.textContent = 'Copy result JSON'; }, 1500);
    } catch {
      // Fallback: select the pre
      const range = document.createRange();
      range.selectNodeContents(out);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
  });
</script>
</body>
</html>
